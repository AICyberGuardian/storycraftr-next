name: Auto-Fix CI Failures

on:
  workflow_run:
    workflows: ["Run Tests with uv + Poetry"] # MUST MATCH EXACTLY the 'name:' field in your pytest.yml
    types: [completed]

jobs:
  fix-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    
    steps:
      - name: Download workflow logs
        uses: actions/github-script@v7
        id: get-logs
        with:
          script: |
            const logs = await github.rest.actions.downloadWorkflowRunLogs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });
            return logs.url;
      
      - name: Invoke Jules to fix failure
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: |
            The CI workflow "${{ github.event.workflow_run.name }}" has failed.

            Failed Run: ${{ github.event.workflow_run.html_url }}
            Branch: ${{ github.event.workflow_run.head_branch }}
            Commit: ${{ github.event.workflow_run.head_sha }}

            Execution Protocol:
            1. Read the repository `AGENTS.md` for strict environment and testing rules.
            2. Analyze the failure from the workflow run logs.
            3. Identify the root cause (e.g., Python 3.11 type hinting, pathlib mismatches).
            4. Implement a fix using standard `poetry` dependency constraints.
            5. Ensure the fix passes `poetry run pytest` before submission.
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ github.event.workflow_run.head_branch }}
          include_last_commit: true