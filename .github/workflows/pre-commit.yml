name: Run pre-commit on all branches

on:
  push:
    branches:
      - "**" # Ejecutar en todas las ramas
  pull_request:
    branches:
      - "**" # Ejecutar en todos los PRs, independientemente de la rama

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Maximize build space
        uses: easimon/maximize-build-space@c28619d8999a147d5e09c1199f84ff6af6ad5794 # master
        with:
          root-reserve-mb: 30000
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create venv
        run: |
          uv venv .venv

      - name: Assert Python baseline
        run: |
          source .venv/bin/activate
          python -c "import sys; assert sys.version_info[:2] == (3, 13), sys.version"

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install pre-commit poetry
          pre-commit install

      - name: Run pre-commit on all files
        run: |
          source .venv/bin/activate
          pre-commit run --all-files

      - name: Ensure lock files are unchanged
        run: git diff --exit-code poetry.lock package-lock.json
