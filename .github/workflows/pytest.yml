name: Run Tests with uv + Poetry

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create venv
        run: |
          uv venv .venv

      - name: Install Poetry (inside venv)
        run: |
          source .venv/bin/activate
          uv pip install poetry
          
      - name: Verify poetry.lock is in sync
        run: |
          source .venv/bin/activate
          poetry check --lock

      - name: Verify package-lock.json is in sync
        run: npm ci --dry-run --ignore-scripts --loglevel=error

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          poetry install --no-interaction --no-root

      - name: Ensure lock files are unchanged
        run: git diff --exit-code poetry.lock package-lock.json

      - name: Run tests
        run: |
          source .venv/bin/activate
          poetry run pytest
