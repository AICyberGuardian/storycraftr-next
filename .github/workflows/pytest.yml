name: Run Tests with uv + Poetry

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv
        run: |
          uv venv .venv

      - name: Install Poetry (inside venv)
        run: |
          source .venv/bin/activate
          uv pip install poetry
          
      - name: Verify poetry.lock is in sync
        run: |
          source .venv/bin/activate
          poetry check --lock

      - name: Verify package-lock.json is in sync
        run: npm ci --dry-run --ignore-scripts --loglevel=error

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          poetry install --no-interaction

      - name: Ensure lock files are unchanged
        run: git diff --exit-code poetry.lock package-lock.json

      - name: Run tests
        run: |
          source .venv/bin/activate
          poetry run pytest

      - name: CLI smoke checks
        run: |
          source .venv/bin/activate
          poetry run storycraftr --help
          poetry run storycraftr chat --help
          poetry run papercraftr --help

      - name: Build VS Code extension
        run: npm run compile

  embeddings-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv
        run: |
          uv venv .venv

      - name: Install Poetry (inside venv)
        run: |
          source .venv/bin/activate
          uv pip install poetry

      - name: Verify poetry.lock is in sync
        run: |
          source .venv/bin/activate
          poetry check --lock

      - name: Install dependencies with embeddings extras
        run: |
          source .venv/bin/activate
          poetry install --with embeddings --no-interaction

      - name: Ensure lock files are unchanged
        run: git diff --exit-code poetry.lock package-lock.json

      - name: Embeddings import smoke test
        run: |
          source .venv/bin/activate
          poetry run python -c "import sentence_transformers, torch; print('sentence_transformers', sentence_transformers.__version__); print('torch', torch.__version__)"
